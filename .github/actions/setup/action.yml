name: "Setup"
description: "Checks out code, sets up Node.js, and installs dependencies"

runs:
  using: "composite"
  steps:
    # Create a symlink for action referencing and allow action pathing to handle forks
    - uses: wei18/local-composite-action@v1
      with:
        action_repository: ${{ github.action_repository }}
        action_path: ${{ github.action_path }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: "npm"

    - name: Install dependencies
      shell: bash
      run: npm ci
