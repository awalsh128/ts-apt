name: "Verify code health and quality"
description: "Runs build, linters, typechecks, unit tests, and generates API docs to verify the code is in a good state"

runs:
  using: "composite"
  steps:
    - name: Lint
      shell: bash
      run: npm run lint

    - name: Typecheck
      shell: bash
      run: npm run typecheck

    - name: Build
      shell: bash
      run: npm run build

    - name: Unit tests
      shell: bash
      run: npm run test:unit

    - name: Integration tests
      shell: bash
      run: npm run test:integration

    - name: Generate API docs
      shell: bash
      run: npm run docs:api

    - name: Verify API docs are up to date
      shell: bash
      run: git diff --exit-code -- docs/api
