name: Ubuntu Integration Tests

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [26]

    steps:
      - name: Setup
        uses: ./.github/actions/setup

      - name: Run integration tests
        run: npm run test:integration
