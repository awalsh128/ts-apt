name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

permissions:
  security-events: write

jobs:
  verification:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [24]
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup
        uses: ./.github/actions/setup-env

      - name: Check code health
        uses: ./.github/actions/codehealth
        with:
          run_tests: "false" # Run full testing with coverage below

      - name: Run tests with coverage
        shell: bash
        run: npm test

      - name: Upload coverage info
        uses: codecov/codecov-action@af2ee03a4e3e11499d866845a1e6c5a11f85cf4e # v4.3.0
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: true

      - name: Annotate coverage on changed files
        uses: jgillick/test-coverage-annotations@74fb1a9d4dbe8048001f4334c60095f65060c62a # v1.0.3
        with:
          access-token: ${{ secrets.GITHUB_TOKEN }}
          coverage: ./coverage/coverage-final.json
          only-changed-files: true
