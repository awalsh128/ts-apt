name: Publish Release

on:
  push:
    branches:
      - main
      - staging # pre-release candidates (i.e. *-rc)
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # For tags/commits
      pages: write # For GitHub Pages deployment
      id-token: write # For OIDC verification (required for Pages and NPM)
      issues: write # For semantic-release comments
      pull-requests: write # For semantic-release comments
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # Crucial for semantic-release to analyze history
          persist-credentials: false
      - name: Setup
        uses: ./.github/actions/setup

      - name: Publish with semantic-release
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate API docs
        if: ${{ github.ref == 'refs/heads/main' }}
        run: npm run docs:api

      - name: Setup Pages
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs/api

      - name: Deploy to GitHub Pages
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
