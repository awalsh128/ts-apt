name: Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example v0.2.0)"
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup
        uses: ./../awalsh128/ts-apt/.github/actions/setup

      # Preflight checks (validate tag format, version consistency, etc.)
      - name: Release preflight (tag/version)
        run: npm run release:preflight

      - name: Verify code health and quality
        uses: ./../awalsh128/ts-apt/.github/actions/verify

  publish:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Create a symlink for action referencing and allow action pathing to handle forks
      - uses: wei18/local-composite-action@v1
        with:
          action_repository: ${{ github.action_repository }}
          action_path: ${{ github.action_path }}

      - name: Setup
        uses: ./../awalsh128/ts-apt/.github/actions/setup

      - name: Build package
        run: npm run build

      - name: Resolve npm dist-tag
        run: |
          TAG="${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}"
          if [[ "$TAG" == *-* ]]; then
            echo "NPM_DIST_TAG=next" >> "$GITHUB_ENV"
          else
            echo "NPM_DIST_TAG=latest" >> "$GITHUB_ENV"
          fi

      - name: Generate API docs
        run: npm run docs:api

      - name: Publish to npm
        run: npm publish --access public --provenance --tag "$NPM_DIST_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/api

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
