name: Publish Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run semantic-release in dry-run mode (no publish, no tag, no release)"
        required: false
        default: false
        type: boolean
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      issues: write # REQUIRED: semantic-release to create GitHub releases
      id-token: write # REQUIRED: OIDC authorization

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Update package.json version to ${GITHUB_REF#refs/tags/v}
        if: ${{ startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != 'true' }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          npm version "${VERSION}" --no-git-tag-version

      - name: Commit Version Sync
        if: ${{ startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: sync package.json version to ${{ github.ref_name }}"
            git push
          fi

  build-pages:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Build Docs
        shell: bash
        run: |
          rm -rf ./docs/api ./docs/api-md # Clean up old docs
          npm run docs:api

  deploy-pages:
    if: ${{ startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    needs: build-pages
    permissions:
      contents: write
      pages: write # REQUIRED: actions/deploy-pages to deploy to GitHub Pages
      issues: write # REQUIRED: semantic-release to create GitHub releases
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
