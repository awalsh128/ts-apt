name: Publish

on:
  push:
    branches: [main, next]
  workflow_dispatch:
    inputs:
      preid:
        description: "Prerelease identifier (for example rc, beta, alpha)"
        required: false
        default: rc
        type: string
      dry_run:
        description: "Run semantic-release in dry-run mode (no publish, no tag, no release)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  checks: write # REQUIRED: Coverage annotations need write permission for checks
  security-events: write
  pull-requests: write # REQUIRED: Coverage annotations need write permission for pull requests
  id-token: write # REQUIRED: Grant ID token write permission for OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [24]
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Check code health
        uses: ./.github/actions/codehealth
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish with semantic-release
        run: |
          if [[ "${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}" == "true" ]]; then
            npm run release:dry-run
          else
            npm run release
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREID: ${{ github.event_name == 'workflow_dispatch' && inputs.preid || 'rc' }}

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs/api

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
