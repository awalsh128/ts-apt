name: Publish Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run semantic-release in dry-run mode (no publish, no tag, no release)"
        required: false
        default: false
        type: boolean
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      issues: write # REQUIRED: Grant issues write permission for semantic-release to create GitHub releases
      id-token: write # REQUIRED: Grant ID token write permission for OIDC
    strategy:
      fail-fast: false
      matrix:
        node-version: [24]
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Update package.json version to ${GITHUB_REF#refs/tags/v}
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          npm version "${VERSION}" --no-git-tag-version

      - name: Commit Version Sync
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: sync package.json version to ${{ github.ref_name }}"
            git push
          fi

      - name: Publish with semantic-release
        if: ${{ !inputs.dry_run }}
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate API docs
        if: ${{ github.ref == 'refs/heads/main' && !inputs.dry_run }}
        run: npm run docs:api

      - name: Setup Pages
        if: ${{ github.ref == 'refs/heads/main' && !inputs.dry_run }}
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        if: ${{ github.ref == 'refs/heads/main' && !inputs.dry_run }}
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs/api

      - name: Deploy to GitHub Pages
        if: ${{ github.ref == 'refs/heads/main' && !inputs.dry_run }}
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
