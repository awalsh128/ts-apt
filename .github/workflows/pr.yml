name: Pull Request Docs Sync

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  docs-sync:
    # Skip forked PRs because GITHUB_TOKEN from base repo cannot safely push there.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup
        uses: ./.github/actions/setup

      - name: Generate Docs
        run: npm run docs

      - name: Add and Commit Docs Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if ! git diff --staged --quiet; then
            git commit -m "docs: auto-update generated docs"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          else
            echo "No doc changes to commit."
          fi
